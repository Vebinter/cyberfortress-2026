name: "Eternal Bot Health Check"

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Log start
        run: 'echo "Orchestrator started: $(date -u)"'

      - name: Check secrets exist
        run: |
          echo "Checking secrets..."
          if [ -z "${{ secrets.SILENTNET_PASS }}" ]; then
            echo "::error::Secret SILENTNET_PASS is missing"
            exit 1
          fi
          echo "Secret SILENTNET_PASS found"

      - name: Test network
        run: |
          echo "Testing network connectivity..."
          if curl -sf --max-time 10 https://api.telegram.org >/dev/null 2>&1; then
            echo "Telegram API reachable"
          else
            echo "::warning::Telegram API not reachable"
          fi
