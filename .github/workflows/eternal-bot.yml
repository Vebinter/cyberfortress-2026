name: 🕊️ Eternal Bot • Health Check

on:
  schedule:
    - cron: '*/10 * * * *'  # Проверка каждые 10 минут
  workflow_dispatch:        # Ручной запуск
  push:
    branches: [main]        # Авто-запуск при обновлении кода

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Лог запуска
        run: echo "✅ Оркестратор запущен: $(date)"

      - name: 🔐 Проверка секретов
        run: |
          if [ -n "${{ secrets.SILENTNET_PASS }}" ]; then
            echo "✅ Секрет SILENTNET_PASS найден"
          else
            echo "❌ Секрет SILENTNET_PASS не найден"
            exit 1
          fi

      - name: 🤖 Тест подключения к Telegram API
        run: |
          # Простая проверка: может ли сервер достичь api.telegram.org
          if curl -sf --max-time 10 "https://api.telegram.org" >/dev/null 2>&1; then
            echo "✅ Telegram API доступен"
          else
            echo "⚠️ Telegram API недоступен (возможно, нужен прокси)"
          fi
